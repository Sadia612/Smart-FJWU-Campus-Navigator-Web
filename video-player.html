<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigator | Full View</title>
    <style>
        /* Remove all margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Body ko pure screen ka use kare */
        body {
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }
        
        /* Video ko puri screen cover kare */
        #player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Yeh important hai - video ko fit karega */
            z-index: 1;
        }
        
        /* Back button ko upar rakhne ke liye */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 30px;
            z-index: 100;
            font-family: sans-serif;
            border: 1px solid white;
            font-weight: bold;
        }
        
        /* Debug info ke liye (optional - agar chahiye toh) */
        .debug-info {
            position: fixed;
            top: 60px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            border-radius: 5px;
            display: none; /* Default hide, agar debug karna ho toh block karein */
        }
    </style>
</head>
<body>
    <a href="scanner.html" class="back-btn">← Back</a>
    
    <!-- Debug info (optional) -->
    <div class="debug-info" id="debug"></div>
    
    <!-- Video Player -->
    <video id="player" controls autoplay playsinline>
        <source src="" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <script>
    const file = new URLSearchParams(window.location.search).get('file');
    const v = document.getElementById('player');
    
    // Video path set karein - server ke through
    const videoSource = v.querySelector('source');
    
    // IMPORTANT: Agar server chal raha hai toh yeh path use karein
    const videoPath = "/videos/" + (file || "guide.mp4");
    
    console.log("Loading video:", videoPath);
    videoSource.src = videoPath;
    
    // Video load karein
    v.load();
    
    // Error handling improve karein
    v.onerror = function(e) {
        console.error("Video error:", e);
        
        // Alternative path try karein
        const altPath = "videos/" + (file || "guide.mp4");
        console.log("Trying alternative path:", altPath);
        videoSource.src = altPath;
        v.load();
        
        v.onerror = function(e2) {
            alert("❌ Video not found. Please make sure:\n\n1. Videos folder exists\n2. File name is correct\n3. Server is running\n\nMissing: " + file || "guide.mp4");
        };
    };
    
    v.onloadeddata = function() {
        console.log("✅ Video loaded successfully!");
        v.play().catch(e => {
            console.log("Autoplay blocked. User needs to click play.");
        });
    };
</script>
</body>
</html>
