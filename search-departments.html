        // =====================
        // SCAN QR FOR DEPARTMENT
        // =====================
 function scanQRForDepartment(deptId) {
    const dept = departments.find(d => d.id === deptId);
    
    if (!dept) {
        alert('Department not found!');
        return;
    }
    
    // Map department name to QR code
    const qrCodeMap = {
        "Environmental Sciences Department": "ENV019",
        "Prayer Room": "PRY020",
        "Sports & Gymnasium": "SPT005",
        "Department of Islamiyat": "ISL006",
        "Department of Media": "MED007",
        "Main Building": "MBD008",
        "VC Lawn": "VCL009",
        "Department of Economics & Finance": "ECF010",
        "Department of Chemistry": "CHE011",
        "Print Shop": "PRT012",
        "Cafeteria": "CAF013",
        "Transport Office": "TRN014",
        "BIC Building": "BIC015",
        "Hostel": "HST016",
        "ICT Lab": "ICT017",
        "New Auditorium": "AUD018"
    };
    
    const qrCode = qrCodeMap[dept.name] || "CCS001"; // Default fallback
    
    localStorage.setItem('scanForDepartment', JSON.stringify({
        id: dept.id,
        name: dept.name,
        qrCode: qrCode,
        timestamp: new Date().toISOString()
    }));
    
    window.location.href = 'scanner.html';
}

            // ADMINISTRATION
           

        // ===================== { id: 37, name: "Prayer Room", location: "Education Building, Ground Floor", type: "facilities", icon: "🕌" }
        // DOM ELEMENTS
        // =====================
        const searchInput = document.getElementById('searchInput');
        const searchButton = document.getElementById('searchButton');
        const suggestionsBox = document.getElementById('suggestionsBox');
        const resultsSection = document.getElementById('resultsSection');
        const resultsGrid = document.getElementById('resultsGrid');
        
        // SIRF FILTER WALE BUTTONS (FEEDBACK WALA NAHI)
        const filterButtons = document.querySelectorAll('.filter-btn[data-filter]');
        
        let activeFilter = 'all';

        // =====================
        // DOM FEATURE 1: LIVE SEARCH SUGGESTIONS
        // =====================
        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            
            if (query.length === 0) {
                suggestionsBox.style.display = 'none';
                return;
            }
            
            const filtered = departments.filter(dept => 
                dept.name.toLowerCase().includes(query) || 
                dept.location.toLowerCase().includes(query)
            ).slice(0, 5);
            
            if (filtered.length === 0) {
                suggestionsBox.innerHTML = `
                    <div class="suggestion-item">
                        <span class="suggestion-icon">🔍</span>
                        <span>No departments found. Try different keywords.</span>
                    </div>
                `;
            } else {
                suggestionsBox.innerHTML = filtered.map(dept => `
                    <div class="suggestion-item" 
                         onclick="selectSuggestion('${dept.name}')">
                        <span class="suggestion-icon">${dept.icon}</span>
                        <div>
                            <div style="font-weight: bold;">${dept.name}</div>
                            <div style="font-size: 12px; color: #666;">${dept.location}</div>
                        </div>
                    </div>
                `).join('');
            }
            
            suggestionsBox.style.display = 'block';
        });

        function selectSuggestion(deptName) {
            searchInput.value = deptName;
            suggestionsBox.style.display = 'none';
            performSearch();
        }

        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.style.display = 'none';
            }
        });

        // =====================
        // DOM FEATURE 2: FILTER BUTTONS (THEEK KIYA HUA)
        // =====================
        filterButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                filterButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                activeFilter = this.dataset.filter;
                performSearch();
            });
        });

        // =====================
        // DOM FEATURE 3: SEARCH FUNCTION
        // =====================
        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            
            let filteredDepts = departments;
            
            if (query) {
                filteredDepts = filteredDepts.filter(dept => 
                    dept.name.toLowerCase().includes(query) || 
                    dept.location.toLowerCase().includes(query)
                );
            }
            
            if (activeFilter !== 'all') {
                filteredDepts = filteredDepts.filter(dept => 
                    dept.type === activeFilter
                );
            }
            
            displayResults(filteredDepts);
        }

        // =====================
        // DOM FEATURE 4: DISPLAY RESULTS
        // =====================
      function displayResults(depts) {
    if (depts.length === 0) {
        resultsGrid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">
                <div style="font-size: 48px; margin-bottom: 10px;"><i class="fas fa-search"></i></div>
                <h3>No departments found</h3>
                <p>Try different keywords or filters</p>
            </div>
        `;
    } else {
        resultsGrid.innerHTML = depts.map(dept => `
            <div class="dept-card">
                <div class="dept-icon">${dept.icon}</div>
                <div class="dept-name">${dept.name}</div>
                <div class="dept-location">📍 ${dept.location}</div>
                <button class="guide-btn" onclick="scanQRForDepartment(${dept.id})">
                    <i class="fas fa-qrcode"></i> Scan QR for Guide
                </button>
            </div>
        `).join('');
    }
    
    resultsSection.style.display = 'block';
    resultsSection.classList.add('fade-in');
}

        // =====================
        // EVENT LISTENERS
        // =====================
        searchButton.addEventListener('click', performSearch);
        
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // =====================
        // OTHER FUNCTIONS
        // =====================
        function goToHome() {
            window.location.href = 'index.html';
        }

        // =====================
        // FEEDBACK SYSTEM
        // =====================
        const feedbackBtn = document.getElementById('feedbackBtn');
        const feedbackModal = document.getElementById('feedbackModal');
        const closeModal = document.getElementById('closeModal');
        const cancelFeedback = document.getElementById('cancelFeedback');
        const feedbackForm = document.getElementById('feedbackForm');
        const successMessage = document.getElementById('successMessage');
        const stars = document.querySelectorAll('.star');
        const ratingInput = document.getElementById('rating');

        // Open Feedback Modal
        feedbackBtn.addEventListener('click', () => {
            feedbackModal.style.display = 'flex';
        });

        // Close Modal Functions
        closeModal.addEventListener('click', () => {
            feedbackModal.style.display = 'none';
            resetForm();
        });

        cancelFeedback.addEventListener('click', () => {
            feedbackModal.style.display = 'none';
            resetForm();
        });

        feedbackModal.addEventListener('click', (e) => {
            if (e.target === feedbackModal) {
                feedbackModal.style.display = 'none';
                resetForm();
            }
        });

        // Star Rating System
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const rating = star.dataset.rating;
                ratingInput.value = rating;
                
                stars.forEach((s, index) => {
                    if (index < rating) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });
        });

        // Form Submission
        feedbackForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const formData = {
                rating: ratingInput.value,
                type: document.getElementById('feedbackType').value,
                message: document.getElementById('feedbackMessage').value.trim(),
                email: document.getElementById('feedbackEmail').value.trim(),
                timestamp: new Date().toISOString(),
                page: 'department-search'
            };
            
            if (formData.message.length < 5) {
                alert('Please enter a meaningful feedback message (at least 5 characters)');
                return;
            }
            
            if (formData.rating == 0) {
                alert('Please select a rating');
                return;
            }
            
            const submitBtn = feedbackForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Submitting...';
            submitBtn.disabled = true;
            
            setTimeout(() => {
                saveFeedback(formData);
                
                feedbackForm.style.display = 'none';
                successMessage.style.display = 'block';
                
                setTimeout(() => {
                    feedbackModal.style.display = 'none';
                    resetForm();
                    successMessage.style.display = 'none';
                    feedbackForm.style.display = 'block';
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }, 2000);
                
            }, 1000);
        });

    function saveFeedback(feedback) {
    // CORRECT ENDPOINT: /api/feedback (not /api/submit-feedback)
    fetch('/api/feedback', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(feedback)
    })
    .then(response => {
        console.log("Response status:", response.status);
        return response.json();
    })
    .then(data => {
        console.log('Server response:', data);
        
        if (data.success) {
            console.log('✅ Feedback saved to server:', data);
            
            // Local storage backup
            const existingFeedback = JSON.parse(localStorage.getItem('fjwu_feedback')) || [];
            existingFeedback.push(feedback);
            localStorage.setItem('fjwu_feedback', JSON.stringify(existingFeedback));
        } else {
            console.error('❌ Server error:', data.message);
            
            // Local storage backup
            const existingFeedback = JSON.parse(localStorage.getItem('fjwu_feedback')) || [];
            existingFeedback.push(feedback);
            localStorage.setItem('fjwu_feedback', JSON.stringify(existingFeedback));
            console.log('📱 Saved to localStorage as backup');
        }
    })
    .catch(error => {
        console.error('❌ Network error:', error);
        
        // Network error pe local storage
        const existingFeedback = JSON.parse(localStorage.getItem('fjwu_feedback')) || [];
        existingFeedback.push(feedback);
        localStorage.setItem('fjwu_feedback', JSON.stringify(existingFeedback));
        console.log('📱 Saved to localStorage (network error)');
    });
}

        function resetForm() {
            feedbackForm.reset();
            ratingInput.value = '0';
            stars.forEach(star => star.classList.remove('active'));
        }

        // =====================
        // INITIALIZE PAGE
        // =====================
        document.addEventListener('DOMContentLoaded', function() {
            console.log("Search page loaded with working filters");
            // Page load pe sab departments dikhao
            displayResults(departments);
        });
    </script>
